# Dummy backend config — for smoke-testing the full pipeline without real model weights.
# Uses DummyBackend which returns fixed outputs instantly.
# Run with: python scripts/run_experiment.py --config config/dummy.yaml

models:
  dummy-model:
    family: dummy

run:
  temperature: 0.0
  max_tokens: 500
  seed: 42
  prompt_version: "v1"

  checkpoint_every_n: 10

  pride_calibration_n: 2
  pride_calibration_seed: 42

  fallback_on_parse_failure: false

  jobs:
    - model: dummy-model
      methods: [baseline, two_prompt, cyclic, pride, calibration, additional_option]
      benchmark: mmlu
      split: robustness

paths:
  runs_dir: runs
  checkpoints_dir: checkpoints
  cache_dir: .cache/responses
  reports_dir: reports
  data_processed_dir: data/processed
  data_splits_dir: data/splits
  prompts_dir: prompts
