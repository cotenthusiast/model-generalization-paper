# Qwen 32B core config — ARC-Challenge, 1000 questions.
# Methods: baseline, calibration, additional_option only (no two_prompt; max_tokens: 64 is safe).
# Run after tiny_qwen32b_mmlu.yaml passes.
# Run with: python scripts/run_experiment.py --config config/qwen32b_arc_core.yaml

models:
  Qwen/Qwen2.5-32B-Instruct:
    model_path: Qwen/Qwen2.5-32B-Instruct
    family: qwen
    size_label: 32B
    device: auto

run:
  temperature: 0.0
  max_tokens: 64
  seed: 42
  prompt_version: "v1"

  max_questions: 1000

  checkpoint_every_n: 50

  pride_calibration_n: 50
  pride_calibration_seed: 42

  fallback_on_parse_failure: false

  jobs:
    - model: Qwen/Qwen2.5-32B-Instruct
      methods: [baseline, calibration, additional_option]
      benchmark: arc_challenge
      split: robustness

paths:
  runs_dir: runs
  checkpoints_dir: checkpoints
  cache_dir: .cache/responses
  reports_dir: reports
  data_processed_dir: data/processed
  data_splits_dir: data/splits
  prompts_dir: prompts
