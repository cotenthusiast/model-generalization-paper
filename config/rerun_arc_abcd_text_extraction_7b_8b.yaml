# Rerun config — completes the 4 incomplete combos found in the Kelvin2 run
# archive: abcd and text_extraction on ARC-Challenge for Qwen 7B and Llama 8B
# each previously stopped at 850/1000 questions (same 150 ids missing in all
# four, no error rows — root cause not pinned down, treat as a clean rerun).
# Run with: python scripts/run_experiment.py --config config/rerun_arc_abcd_text_extraction_7b_8b.yaml

models:
  Qwen/Qwen2.5-7B-Instruct:
    model_path: Qwen/Qwen2.5-7B-Instruct
    family: qwen
    size_label: 7B
    device: auto
  meta-llama/Llama-3.1-8B-Instruct:
    model_path: meta-llama/Llama-3.1-8B-Instruct
    family: llama
    size_label: 8B
    device: auto

run:
  temperature: 0.0
  max_tokens: 500
  seed: 42
  prompt_version: "v1"

  max_questions: 1000

  checkpoint_every_n: 50

  similarity_threshold: 0.3

  fallback_on_parse_failure: false

  jobs:
    - model: Qwen/Qwen2.5-7B-Instruct
      methods: [abcd, text_extraction]
      benchmark: arc_challenge
      split: robustness
    - model: meta-llama/Llama-3.1-8B-Instruct
      methods: [abcd, text_extraction]
      benchmark: arc_challenge
      split: robustness

paths:
  runs_dir: runs
  checkpoints_dir: checkpoints
  cache_dir: .cache/responses
  reports_dir: reports
  data_processed_dir: data/processed
  data_splits_dir: data/splits
  prompts_dir: prompts
