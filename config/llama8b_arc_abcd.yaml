# Llama 3.1 8B abcd config — ARC-Challenge, 1000 questions.
# Stage 1 free-text generation (options shown under neutral dash labels);
# Stage 2 sentence-embedding cosine match — no second LLM call.
# Run after llama8b_mmlu_abcd.yaml passes.
# Run with: python scripts/run_experiment.py --config config/llama8b_arc_abcd.yaml

models:
  meta-llama/Llama-3.1-8B-Instruct:
    model_path: meta-llama/Llama-3.1-8B-Instruct
    family: llama
    size_label: 8B
    device: auto

run:
  temperature: 0.0
  max_tokens: 500
  seed: 42
  prompt_version: "v1"

  max_questions: 1000

  checkpoint_every_n: 50

  similarity_threshold: 0.3

  fallback_on_parse_failure: false

  jobs:
    - model: meta-llama/Llama-3.1-8B-Instruct
      methods: [abcd]
      benchmark: arc_challenge
      split: robustness

paths:
  runs_dir: runs
  checkpoints_dir: checkpoints
  cache_dir: .cache/responses
  reports_dir: reports
  data_processed_dir: data/processed
  data_splits_dir: data/splits
  prompts_dir: prompts
