# Two-prompt research — runtime configuration (local model / HPC)
#
# Edit this file to change what gets run or add new models.
# The Python modules in src/modelgen/config/ should not be edited
# for run configuration.

# ---------------------------------------------------------------------------
# Model definitions
# ---------------------------------------------------------------------------
# Each key is the model name that appears in run CSVs and evaluation reports.
# It must match MODEL_ORDER in evaluate_run.py and aggregate_results.py exactly.
#
# Fields:
#   model_path  - HuggingFace hub ID or absolute path to local weights
#   family      - "qwen" | "llama" (used for backend selection)
#   size_label  - informational only, e.g. "7B"
#   device      - "auto" (recommended for multi-GPU), "cuda", or "cpu"

models:
  Qwen/Qwen2.5-7B-Instruct:
    model_path: Qwen/Qwen2.5-7B-Instruct
    family: qwen
    size_label: 7B
    device: auto

  meta-llama/Llama-3.1-8B-Instruct:
    model_path: meta-llama/Llama-3.1-8B-Instruct
    family: llama
    size_label: 8B
    device: auto

# ---------------------------------------------------------------------------
# Run settings
# ---------------------------------------------------------------------------
run:
  temperature: 0.0
  max_tokens: 500
  seed: 42
  prompt_version: "v1"

  # Save progress to a checkpoint file every N completed questions per job.
  checkpoint_every_n: 50

  # PriDe calibration settings.
  pride_calibration_n: 50
  pride_calibration_seed: 42

  fallback_on_parse_failure: false

  # Job matrix: each entry is one (model × methods × benchmark × split) run.
  # To add a new model, add it under `models` above and append jobs here.
  jobs:
    - model: Qwen/Qwen2.5-7B-Instruct
      methods: [baseline, two_prompt, cyclic, pride, calibration]
      benchmark: mmlu
      split: robustness
    - model: meta-llama/Llama-3.1-8B-Instruct
      methods: [baseline, two_prompt, cyclic, calibration]
      benchmark: mmlu
      split: robustness
    - model: Qwen/Qwen2.5-7B-Instruct
      methods: [baseline, two_prompt, cyclic, pride, calibration]
      benchmark: arc_challenge
      split: robustness
    - model: meta-llama/Llama-3.1-8B-Instruct
      methods: [baseline, two_prompt, cyclic, calibration]
      benchmark: arc_challenge
      split: robustness

# ---------------------------------------------------------------------------
# Paths (relative to repo root)
# ---------------------------------------------------------------------------
paths:
  runs_dir: runs
  checkpoints_dir: checkpoints
  cache_dir: .cache/responses
  reports_dir: reports
  data_processed_dir: data/processed
  data_splits_dir: data/splits
  prompts_dir: prompts
