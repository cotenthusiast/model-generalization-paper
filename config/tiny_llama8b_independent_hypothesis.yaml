# Llama 3.1 8B independent_hypothesis tiny smoke-test — MMLU, 5 questions.
# One independent generate() call per option (each option evaluated alone as
# a hypothesis, never alongside the others); final prediction is the argmax
# of the regex-parsed confidence scores, with ties broken by a seeded RNG.
# Run with: python scripts/run_experiment.py --config config/tiny_llama8b_independent_hypothesis.yaml

models:
  meta-llama/Llama-3.1-8B-Instruct:
    model_path: meta-llama/Llama-3.1-8B-Instruct
    family: llama
    size_label: 8B
    device: auto

run:
  temperature: 0.0
  max_tokens: 500
  seed: 42
  prompt_version: "v1"

  max_questions: 5

  checkpoint_every_n: 5

  fallback_on_parse_failure: false

  jobs:
    - model: meta-llama/Llama-3.1-8B-Instruct
      methods: [independent_hypothesis]
      benchmark: mmlu
      split: robustness

paths:
  runs_dir: runs
  checkpoints_dir: checkpoints
  cache_dir: .cache/responses
  reports_dir: reports
  data_processed_dir: data/processed
  data_splits_dir: data/splits
  prompts_dir: prompts
