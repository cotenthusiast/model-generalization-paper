# Qwen 32B text_extraction tiny smoke-test — MMLU, 5 questions.
# Stage 1 free-text generation (A/B/C/D labels shown, model told not to state the letter);
# Stage 2 sentence-embedding cosine match — no second LLM call.
# Run with: python scripts/run_experiment.py --config config/tiny_qwen32b_text_extraction.yaml

models:
  Qwen/Qwen2.5-32B-Instruct:
    model_path: Qwen/Qwen2.5-32B-Instruct
    family: qwen
    size_label: 32B
    device: auto

run:
  temperature: 0.0
  max_tokens: 500
  seed: 42
  prompt_version: "v1"

  max_questions: 5

  checkpoint_every_n: 5

  similarity_threshold: 0.3

  fallback_on_parse_failure: false

  jobs:
    - model: Qwen/Qwen2.5-32B-Instruct
      methods: [text_extraction]
      benchmark: mmlu
      split: robustness

paths:
  runs_dir: runs
  checkpoints_dir: checkpoints
  cache_dir: .cache/responses
  reports_dir: reports
  data_processed_dir: data/processed
  data_splits_dir: data/splits
  prompts_dir: prompts
