# Small batch config — end-to-end sanity check with real model weights.
# Runs 20 questions per benchmark/split across all methods and both models.
# Run with: python scripts/run_experiment.py --config config/small_batch.yaml

models:
  Qwen/Qwen2.5-7B-Instruct:
    model_path: Qwen/Qwen2.5-7B-Instruct
    family: qwen
    size_label: 7B
    device: auto

  meta-llama/Llama-3.1-8B-Instruct:
    model_path: meta-llama/Llama-3.1-8B-Instruct
    family: llama
    size_label: 8B
    device: auto

run:
  temperature: 0.0
  max_tokens: 500
  seed: 42
  prompt_version: "v1"

  max_questions: 20

  checkpoint_every_n: 10

  pride_calibration_n: 10
  pride_calibration_seed: 42

  fallback_on_parse_failure: false

  jobs:
    - model: Qwen/Qwen2.5-7B-Instruct
      methods: [baseline, two_prompt, cyclic, pride, calibration, additional_option]
      benchmark: mmlu
      split: robustness
    - model: meta-llama/Llama-3.1-8B-Instruct
      methods: [baseline, two_prompt, cyclic, calibration, additional_option]
      benchmark: mmlu
      split: robustness
    - model: Qwen/Qwen2.5-7B-Instruct
      methods: [baseline, two_prompt, cyclic, pride, calibration, additional_option]
      benchmark: arc_challenge
      split: robustness
    - model: meta-llama/Llama-3.1-8B-Instruct
      methods: [baseline, two_prompt, cyclic, calibration, additional_option]
      benchmark: arc_challenge
      split: robustness

paths:
  runs_dir: runs
  checkpoints_dir: checkpoints
  cache_dir: .cache/responses
  reports_dir: reports
  data_processed_dir: data/processed
  data_splits_dir: data/splits
  prompts_dir: prompts
